<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transactions - PayFlows</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
        background: linear-gradient(to top, rgb(140, 140, 240), rgb(231, 231, 225));
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #ffffff;
      padding: 25px;
      border-radius: 10px;
      border: 2px solid black;
    }

    h1, h2 {
      text-align: center;
      color: black;
    }

    .transaction {
      background: #e3f2fd;
      border: 1px solid black;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .transaction p {
      margin: 5px 0;
    }

    form {
      margin-top: 20px;
    }

    form input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    form button {
      width: 100%;
      padding: 12px;
      background:black;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
    }

    form button:hover {
      background-color:black;
    }
    #c2{
 width: 100%;
      padding: 12px;
      background:black;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom:20px;
    }
    #c3{
      padding: 12px;
      background-color:black;
      color:#e3f2fd;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
    }
  


    
  </style>
</head>
<body>
  <div class="container">
    <h1>My Transactions</h1>
    <div id="transaction-list">
      <div class="transaction">
        <p><strong>Date:</strong> 2026-05-09</p>
        <p><strong>Description:</strong> Grocery Shopping</p>
        <p><strong>Amount:</strong> ₹2500</p>
      </div>
      <div class="transaction">
        <p><strong>Date:</strong> 2026-05-08</p>
        <p><strong>Description:</strong> Online Recharge</p>
        <p><strong>Amount:</strong> ₹399</p>
      </div>
    </div>

    <h2>Add New Transaction</h2>
    <form id="transaction-form">
      <input type="date" id="date" required>
      <input type="text" id="desc" placeholder="Description" required>
      <input type="number" id="amount" placeholder="Amount" required>
      <button type="submit">Add Transaction</button>
      <br>
      <br>
    
    </form>
  </div>
  
      <a href="dashboard.html" id="c2">
            <button id="b2" onclick="j2()">
                                 back to list.
      </button>

      </a>
      <form id="c3">
        balance<input type="number" id="k2" placeholder="balance">
         amount to pay<input type="number" id="k3" placeholder="amout to pay">
         <br>
         <br>
         
<a href="recipt.html">
           <buttton  onclick="paybill()" id="pay" style="background-color:white;color:black;border:none;padding:10px;border-radius:4px; margin:2px;text-decoration:none;display: inline-block;"> 
           
               paybill;
                   </buttton>
               </a>

<script>
  function paybill(){
    alert("Payment successful!");
    // Redirect to receipt page
    window.location.href = "receipt.html";
  }
</script>

               

      </form>
      

  <script>
    document.getElementById("transaction-form").addEventListener("submit", function(event) {
      event.preventDefault();

  
      const date = document.getElementById("date").value;
      const desc = document.getElementById("desc").value;
      const amount = document.getElementById("amount").value;

      const newTransaction = document.createElement("div");
      newTransaction.classList.add("transaction");
      newTransaction.innerHTML = `
        <p><strong>Date:</strong> ${date}</p>
        <p><strong>Description:</strong> ${desc}</p>
        <p><strong>Amount:</strong> ₹${amount}</p>
      `;

      document.getElementById("transaction-list").appendChild(newTransaction);


      document.getElementById("transaction-form").reset();
    });
    function  j2(){
       alert("back to list");
    } 
    function paybill(){
      alert("your payment is sucessfull");
    }
    
  </script>
</body>
</html>
